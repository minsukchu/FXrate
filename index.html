<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환율 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1e2d45;
    --accent-gold: #c9a84c;
    --text-primary: #f0f4ff;
    --text-secondary: #6b7fa3;
    --text-dim: #3a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 50%);
  }

  .container { width: 100%; max-width: 480px; }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.3em; color: var(--accent-gold);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .header .title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .timestamp {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text-secondary);
    margin-top: 6px; letter-spacing: 0.05em;
  }

  .cards { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    position: relative; overflow: hidden;
    transition: border-color 0.3s;
    animation: fadeIn 0.4s ease both;
  }
  .card:nth-child(1) { animation-delay: 0.05s; --card-accent: #3b82f6; }
  .card:nth-child(2) { animation-delay: 0.10s; --card-accent: #ef4444; }
  .card:nth-child(3) { animation-delay: 0.15s; --card-accent: #10b981; }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--card-accent); opacity: 0.8;
  }
  .card:hover { border-color: #2e4060; }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--text-secondary); text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--card-accent); flex-shrink: 0;
  }

  .pair { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
  .from-currency {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text-secondary); font-weight: 300; white-space: nowrap;
  }
  .rate-value {
    font-family: 'DM Mono', monospace; font-size: 36px;
    font-weight: 500; letter-spacing: -0.02em; line-height: 1;
  }
  .rate-value.loading {
    color: var(--text-dim);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .to-currency {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text-secondary); font-weight: 300;
  }
  .source-note {
    font-size: 10px; color: var(--text-dim);
    margin-top: 8px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .refresh-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 24px; background: none;
    border: 1px solid var(--border); color: var(--text-secondary);
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 12px 24px; border-radius: 999px;
    cursor: pointer; width: 100%; transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
  .refresh-btn svg { width: 13px; height: 13px; }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }

  .error-msg {
    text-align: center; font-size: 11px; color: #ef4444;
    font-family: 'DM Mono', monospace; margin-top: 12px; display: none;
    line-height: 1.7;
  }
  .disclaimer {
    text-align: center; font-size: 10px; color: var(--text-dim);
    margin-top: 16px; font-family: 'DM Mono', monospace;
    line-height: 1.6; letter-spacing: 0.03em;
  }

  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.7} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Exchange Rate Monitor</h1>
    <div class="title">기준 환율</div>
    <div class="timestamp" id="timestamp">불러오는 중...</div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-label"><span class="dot"></span>달러 대비 루피아</div>
      <div class="pair">
        <span class="from-currency">USD 1 =</span>
        <span class="rate-value loading" id="usd-idr">— — —</span>
        <span class="to-currency">IDR</span>
      </div>
      <div class="source-note" id="src-1"></div>
    </div>

    <div class="card">
      <div class="card-label"><span class="dot"></span>달러 대비 원화</div>
      <div class="pair">
        <span class="from-currency">USD 1 =</span>
        <span class="rate-value loading" id="usd-krw">— — —</span>
        <span class="to-currency">KRW</span>
      </div>
      <div class="source-note" id="src-2"></div>
    </div>

    <div class="card">
      <div class="card-label"><span class="dot"></span>원화 대비 루피아</div>
      <div class="pair">
        <span class="from-currency">KRW 1,000 =</span>
        <span class="rate-value loading" id="krw-idr">— — —</span>
        <span class="to-currency">IDR</span>
      </div>
      <div class="source-note" id="src-3"></div>
    </div>
  </div>

  <button class="refresh-btn" id="refresh-btn" onclick="fetchRates()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <polyline points="1 20 1 14 7 14"></polyline>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
    </svg>
    새로고침
  </button>
  <div class="error-msg" id="error-msg"></div>

  <div class="disclaimer">
    * fawazahmed0/exchange-api (GitHub) · 키 불필요 · 매일 업데이트<br>
    참고용이며 실제 거래 환율과 다를 수 있습니다
  </div>
</div>

<script>
  function fmt(num) {
    return Number(num).toLocaleString('ko-KR', { maximumFractionDigits: 0 });
  }

  function setLoading(on) {
    ['usd-idr','usd-krw','krw-idr'].forEach(id => {
      const el = document.getElementById(id);
      if (on) el.textContent = '— — —';
      on ? el.classList.add('loading') : el.classList.remove('loading');
    });
    const btn = document.getElementById('refresh-btn');
    on ? btn.classList.add('spinning') : btn.classList.remove('spinning');
  }

  // 오늘 날짜 YYYY-MM-DD (자카르타 기준)
  function todayWIB() {
    return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Jakarta' });
  }

  async function tryFetch(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function fetchRates() {
    setLoading(true);
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    const date = todayWIB();

    // Primary: jsDelivr CDN (CORS 완전 허용)
    const primaryUrl   = `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json`;
    // Fallback: raw GitHub
    const fallbackUrl  = `https://latest.currency-api.pages.dev/v1/currencies/usd.json`;

    let data = null;
    let usedSource = '';

    try {
      data = await tryFetch(primaryUrl);
      usedSource = 'jsDelivr CDN';
    } catch (e1) {
      try {
        data = await tryFetch(fallbackUrl);
        usedSource = 'currency-api.pages.dev';
      } catch (e2) {
        errEl.textContent = '환율 데이터를 불러오지 못했습니다.\n잠시 후 다시 시도해주세요.';
        errEl.style.display = 'block';
        document.getElementById('timestamp').textContent = '데이터 불러오기 실패';
        setLoading(false);
        return;
      }
    }

    try {
      const rates = data.usd;
      const usdIdr = rates['idr'];
      const usdKrw = rates['krw'];

      if (!usdIdr || !usdKrw) throw new Error('Missing rates');

      const krwIdr = (usdIdr / usdKrw) * 1000;

      document.getElementById('usd-idr').textContent = fmt(usdIdr);
      document.getElementById('usd-krw').textContent = fmt(usdKrw);
      document.getElementById('krw-idr').textContent = fmt(krwIdr);

      const now = new Date().toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jakarta'
      });
      document.getElementById('timestamp').textContent = `업데이트: ${now} (WIB)`;

      ['src-1','src-2','src-3'].forEach(id => {
        document.getElementById(id).textContent = `출처: fawazahmed0/currency-api · ${usedSource}`;
      });

    } catch(e) {
      errEl.textContent = '데이터 파싱 오류가 발생했습니다.';
      errEl.style.display = 'block';
    } finally {
      setLoading(false);
    }
  }

  fetchRates();
</script>
</body>
</html>
